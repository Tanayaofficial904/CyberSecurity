<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cyber Security Quiz</title>
  <link rel="stylesheet" href="./CSS/quiz.css">
  
</head>

<body>
   

<div class="quiz-container">

  <h1>🧠 Cyber Security Quiz</h1>

  <h2 id="question"></h2>

  <div class="options">
    <button class="option" onclick="selectAnswer(0)"></button>
    <button class="option" onclick="selectAnswer(1)"></button>
    <button class="option" onclick="selectAnswer(2)"></button>
    <button class="option" onclick="selectAnswer(3)"></button>
  </div>

  <button id="nextBtn" onclick="nextQuestion()">Next</button>
  <button id="submitBtn" onclick="submitQuiz()" style="display:none;">Submit Quiz</button>

</div>

<script>

const questions = [
  { question: "What is phishing?", options: ["Hacking system", "Fake emails", "Virus", "Firewall"], answer: 1 },
  { question: "Strong password should contain?", options: ["Only numbers", "Only letters", "Mix of all", "Only symbols"], answer: 2 },
  { question: "What is malware?", options: ["Security tool", "Harmful software", "Password", "Browser"], answer: 1 },
  { question: "What is 2FA?", options: ["Two passwords", "Extra security layer", "Antivirus", "Firewall"], answer: 1 },
  { question: "Ransomware does?", options: ["Delete files", "Lock files", "Backup data", "Encrypt email"], answer: 1 },
  { question: "Safe browsing means?", options: ["Click all links", "Use secure sites", "Download everything", "Ignore updates"], answer: 1 },
  { question: "OTP should be?", options: ["Shared", "Saved", "Private", "Public"], answer: 2 },
  { question: "HTTPS means?", options: ["Secure site", "Virus", "Firewall", "Malware"], answer: 0 },
  { question: "Antivirus is used for?", options: ["Games", "Security", "Emails", "Social media"], answer: 1 },
  { question: "Social engineering is?", options: ["Coding", "Tricking people", "Firewall", "Encryption"], answer: 1 }
];

let currentQ = 0;
let score = 0;
let selected = null;

// Load question
function loadQuestion() {
  const q = questions[currentQ];
  document.getElementById("question").innerText = (currentQ + 1) + ". " + q.question;

  const options = document.querySelectorAll(".option");
  options.forEach((btn, i) => {
    btn.innerText = q.options[i];
    btn.style.background = "white";
  });

  selected = null;

  // Button toggle
  if (currentQ === questions.length - 1) {
    document.getElementById("nextBtn").style.display = "none";
    document.getElementById("submitBtn").style.display = "inline-block";
  } else {
    document.getElementById("nextBtn").style.display = "inline-block";
    document.getElementById("submitBtn").style.display = "none";
  }
}

// Select answer
function selectAnswer(index) {
  selected = index;

  const options = document.querySelectorAll(".option");
  options.forEach(btn => btn.style.background = "white");
  options[index].style.background = "#38bdf8";
}

// Next question
function nextQuestion() {
  if (selected === null) {
    alert("Please select an answer!");
    return;
  }

  if (selected === questions[currentQ].answer) {
    score++;
  }

  currentQ++;
  loadQuestion();
}

// Submit quiz
function submitQuiz() {
  if (selected === null) {
    alert("Please select an answer!");
    return;
  }

  if (selected === questions[currentQ].answer) {
    score++;
  }

  // Save score
  localStorage.setItem("quizScore", score);

  // 🎉 POPUP
  alert("🎉 Quiz Completed!\nYour Score: " + score + " / 10");

  // Redirect
  window.location.href = "dashboard.html";
}

// Start quiz
loadQuestion();

</script>

</body>
</html>
